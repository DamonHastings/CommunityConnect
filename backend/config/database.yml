default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  port: 5432

development:
  <<: *default
  database: community_connect_development

test:
  <<: *default
  database: community_connect_test

production:
  primary: &primary_production
    <<: *default
    database: community_connect_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: community_connect_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: community_connect_production_queue
    migrations_paths: db/queue_migrate
